services:
  # ── Production Database ──────────────────────────────
  db-prod:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: hvac_user
      POSTGRES_PASSWORD: ${DB_PROD_PASSWORD}
      POSTGRES_DB: hvac_prod
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvac_user -d hvac_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Development Database ─────────────────────────────
  db-dev:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: hvac_user
      POSTGRES_PASSWORD: ${DB_DEV_PASSWORD}
      POSTGRES_DB: hvac_dev
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvac_user -d hvac_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── PgBouncer Connection Pooler ──────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    restart: always
    environment:
      DATABASES_HOST: db-prod
      DATABASES_PORT: 5432
      DATABASES_USER: hvac_user
      DATABASES_PASSWORD: ${DB_PROD_PASSWORD}
      DATABASES_DBNAME: hvac_prod
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_MIN_POOL_SIZE: 5
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_MAX_DB_CONNECTIONS: 50
      PGBOUNCER_RESERVE_POOL_SIZE: 5
      PGBOUNCER_SERVER_IDLE_TIMEOUT: 300
    depends_on:
      db-prod:
        condition: service_healthy
    networks:
      - internal

  # ── PgBouncer for Dev ────────────────────────────────
  pgbouncer-dev:
    image: edoburu/pgbouncer:1.22.0
    restart: always
    environment:
      DATABASES_HOST: db-dev
      DATABASES_PORT: 5432
      DATABASES_USER: hvac_user
      DATABASES_PASSWORD: ${DB_DEV_PASSWORD}
      DATABASES_DBNAME: hvac_dev
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_DEFAULT_POOL_SIZE: 10
      PGBOUNCER_MIN_POOL_SIZE: 2
      PGBOUNCER_MAX_CLIENT_CONN: 500
      PGBOUNCER_MAX_DB_CONNECTIONS: 25
    depends_on:
      db-dev:
        condition: service_healthy
    networks:
      - internal

  # ── Redis (shared, with separate DB numbers) ─────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000 --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Production App ───────────────────────────────────
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://hvac_user:${DB_PROD_PASSWORD}@pgbouncer:6432/hvac_prod
      REDIS_URL: redis://redis:6379/0
      NEXTAUTH_URL: https://${PROD_DOMAIN}
      NEXTAUTH_SECRET: ${PROD_NEXTAUTH_SECRET}
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/auth/csrf || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal
      - web

  # ── Development App ──────────────────────────────────
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://hvac_user:${DB_DEV_PASSWORD}@pgbouncer-dev:6432/hvac_dev
      REDIS_URL: redis://redis:6379/1
      NEXTAUTH_URL: https://${DEV_DOMAIN}
      NEXTAUTH_SECRET: ${DEV_NEXTAUTH_SECRET}
    depends_on:
      pgbouncer-dev:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/auth/csrf || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal
      - web

volumes:
  pgdata_prod:
  pgdata_dev:
  redisdata:

networks:
  internal:
  web:
    external: true
